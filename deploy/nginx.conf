worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format upstream_main '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'upstream=$upstream_addr request_time=$request_time '
                             'upstream_response_time=$upstream_response_time';

    access_log /dev/stdout upstream_main;
    error_log /dev/stderr info;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    upstream crawler_backend {
        least_conn;
        include /tmp/nginx_upstream_servers.conf;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        location = /crawl {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_next_upstream off;
            gzip off;

            proxy_read_timeout 2100s;
            proxy_send_timeout 2100s;

            proxy_pass http://crawler_backend;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_next_upstream off;

            proxy_pass http://crawler_backend;
        }
    }
}
