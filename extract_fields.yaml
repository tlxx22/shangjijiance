# 详情页字段提取配置（V2）
# 定义需要从详情页中提取的字段（按 stage 分组，用于两次 LLM 提取）
#
# - type: string (默认) | number | boolean | array
# - stage: flat | lots
#
# 约定：
# - 金额字段单位统一为“万元”，保留两位小数
# - 日期字段格式统一为 YYYY-MM-DD
# - array 字段无内容时返回 []

fields:
  # ===== 扁平字段（stage: flat）=====
  - key: projectName
    name: 项目名称
    type: string
    stage: flat
    hint: 整个招投标项目名称（取详情页的项目名称，或智能体总结）

  - key: projectId
    name: 项目编号
    type: string
    stage: flat
    hint: 包含公告编号、招标编号、合同编号、询价单编号等（尽量提取编号本体）

  - key: announcementDate
    name: 公告日期
    type: string
    stage: flat
    required: true
    hint: 项目本公告发布日期，格式 YYYY-MM-DD（优先详情页发布日期）

  - key: bidOpenDate
    name: 开标日期
    type: string
    stage: flat
    hint: 项目开标日期，格式 YYYY-MM-DD

  - key: budgetAmount
    name: 预算金额
    type: number
    stage: flat
    hint: 数字，单位：万元（保留两位小数）。若页面为元/亿需换算到万元

  - key: estimatedAmount
    name: 预估金额
    type: string
    stage: flat
    hint: 若无预算/中标金额，估算范围，格式 "下限~上限"，单位：万元，两位小数

  - key: buyerAddress
    name: 采购单位地址
    type: string
    stage: flat
    hint: 采购单位/招标单位地址全称（如有）

  - key: buyerRegion
    name: 采购单位地区
    type: string
    stage: flat
    hint: 识别采购单位地址所属省/国家（直接输出全称，如“湖南省”“坦桑尼亚”）

  - key: projectAddress
    name: 项目所在地址
    type: string
    stage: flat
    hint: 项目所在地址全称（如有）

  - key: projectRegion
    name: 项目所在地区
    type: string
    stage: flat
    hint: 识别项目所在地址所属省/国家（直接输出全称）

  - key: deliveryAddress
    name: 交货地址
    type: string
    stage: flat
    hint: 交货地址全称（如有）

  - key: deliveryRegion
    name: 交货地区
    type: string
    stage: flat
    hint: 识别交货地址所属省/国家（直接输出全称）

  - key: buyerName
    name: 采购单位
    type: string
    stage: flat
    required: true
    hint: 招标单位/采购单位全称

  - key: buyerContact
    name: 采购单位联系人
    type: string
    stage: flat
    hint: 采购单位联系人（如有）

  - key: buyerPhone
    name: 采购单位联系电话
    type: string
    stage: flat
    hint: 采购单位联系电话（如有）

  - key: agency
    name: 招标代理机构
    type: string
    stage: flat
    hint: 招标代理机构全称（如有）

  - key: announcementType
    name: 公告类别
    type: string
    stage: flat
    required: true
    enum: [预审, 招标, 询价, 竞谈, 竞价, 邀标, 单一, 变更, 答疑, 候选, 中标, 合同, 终止]
    hint: |
      必须从枚举中选择一个。注意语义判断：
      - “评标结果公示” 属于“候选”
      - “招标结果公告/成交结果公告” 属于“中标”

  # ===== 标段字段（stage: lots）=====
  - key: lotProducts
    name: 标段采购产品列表
    type: array
    stage: lots
    hint: |
      返回数组，每个元素是一条“标的物行”（同一标段多条标的物就返回多条记录）：
      {
        "lotNumber": "标段一/标段二/...",
        "lotName": "标段名称（如有）",
        "subjects": "标的物（单条）",
        "productCategory": "具体产品（如能匹配“具体产品表”则填标准名称；匹配不到填\"\"）",
        "models": "型号（单条）",
        "unitPrices": "单价（万元，两位小数，单条）",
        "quantities": "数量（正整数，单条）"
      }

      重要规则：
      - 若页面未明确拆分多个标段，但能识别到采购标的/采购内容（哪怕只在标题或项目名称中出现），也请返回单标段对象：lotNumber="标段一"
      - 若同一标段存在多个标的物，不要在字段里输出数组；请输出多条元素，每条一行
      - 若页面完全没有任何标的物/采购内容信息，则返回 []

  - key: lotCandidates
    name: 标段候选/中标信息列表
    type: array
    stage: lots
    hint: |
      返回数组，每个元素是一条“候选单位行”（同一标段多家候选单位就返回多条记录）：
      {
        "lotNumber": "标段一/标段二/...",
        "lotName": "标段名称（如有）",
        "candidates": "候选单位（单条，按名次从高到低逐行输出）",
        "candidatePrices": "候选单位报价（万元，两位小数，单条）",
        "winner": "中标单位（如有）",
        "winningAmount": 123.45
      }

      重要规则：
      - 若页面未明确拆分多个标段，但包含候选/中标/报价等信息，也请返回单标段对象：lotNumber="标段一"
      - 若同一标段存在多家候选单位，不要在字段里输出数组；请输出多条元素，每条一行
      - 若页面完全没有候选/中标信息，则返回 []
