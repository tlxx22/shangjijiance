# 定义需要从详情页中提取的字段（按 stage 分组，用于两次 LLM 提取）
#
# - type: string (默认) | number | boolean | array
# - stage: flat | lots
#
# 约定：
# - 金额字段单位统一为“元”，小数位数尽量与原页面保持一致
# - 日期字段格式统一为 YYYY-MM-DD
# - array 字段无内容时返回 []

fields:
  # ===== 扁平字段（stage: flat）=====
  - key: announcementUrl
    name: 公告链接
    type: string
    stage: flat
    hint: 公告详情页的原始链接 URL（如果输入文本中出现多个 URL，优先选择最像“公告详情页/正文页”的链接；找不到填 ""）

  - key: announcementName
    name: 公告标题
    type: string
    stage: flat
    hint: 公告标题/公告名称（找不到填 ""）

  - key: announcementContent
    name: 公告正文
    type: string
    stage: flat
    hint: 公告正文/公告详情文字内容（不要直接输出整段输入文本；找不到填 ""）

  - key: projectName
    name: 项目名称
    type: string
    stage: flat
    hint: 整个招投标项目名称（取详情页的项目名称，或智能体总结）

  - key: projectId
    name: 项目编号
    type: string
    stage: flat
    hint: |
      仅提取“项目编号/招标编号/采购编号/询价单号/合同编号/公告编号”等【明确标注】的编号值：
      - 典型写法：项目编号：XXX / 招标编号：XXX / 采购编号：XXX / 询价单号：XXX / 合同编号：XXX / 公告编号：XXX / No./Code: XXX
      - 如果输入文本本身是 JSON，且存在 projectId/projectcode/noticeCode/bidCode/招标编号 等字段，优先使用这些字段值（取编号本体）。
      禁止从标题/项目名称里的数字去“猜”项目编号：标题中嵌入的短纯数字（尤其 6 位数字，如 260206）很多时候只是日期缩写（YYMMDD）或内部批次号，不是正式编号；
      除非正文中有明确“编号”标签或结构化字段承载该值，否则不要填入 projectId。
      不要把物资编码/物料编码/设备编码、电话号码、日期、金额、数量等数字当作 projectId。
      找不到或不确定时填 ""。

  - key: announcementDate
    name: 公告日期
    type: string
    stage: flat
    required: true
    hint: |
      公告实际发布日期，格式 YYYY-MM-DD。
      - 必须从输入结构体中的“发布日期/发布时间/公告日期”等元数据字段提取（字段名不固定时，以 description 字段对各 key 含义的说明为准）。
      - 若该元数据字段为时间戳（秒/毫秒），请换算为 YYYY-MM-DD；若为其它日期文本，也请规范为 YYYY-MM-DD。
      - 禁止从正文内容字段（例如 detail/announcementContent/公告正文 等）中的日期推断 announcementDate；正文中的“预计发布时间/计划发布时间”等不是公告发布日期。
      - 找不到明确的发布日期字段时填 ""（不要猜）。

  - key: bidOpenDate
    name: 开标日期
    type: string
    stage: flat
    hint: 项目开标日期，格式 YYYY-MM-DD

  - key: budgetAmount
    name: 预算金额
    type: number
    stage: flat
    hint: 数字，单位：元。若页面为万元/亿需换算到元（小数位数尽量与原页面保持一致）

  - key: winnerAmount
    name: 中标金额
    type: number
    stage: flat
    hint: 数字，单位：元。仅当详情页明确给出“中标/成交/定标/授标金额”等信息时填写；取不到填 null

  - key: estimatedAmount
    name: 预估金额
    type: string
    stage: flat
    required: true
    hint: |
      仅当公告类型为以下 6 类之一时才输出预估金额：招标、询价、竞谈、单一、竞价、邀标；其它公告类型必须返回 ""。

      输出格式（单位：元）：
      - 单一金额：如 "123456.78"
      - 或范围：如 "100000~200000"（范围用 ~ 连接）

      计算逻辑（按优先级从高到低）：
      1) 若详情页/输入中存在“中标/成交/定标/授标金额”等明确金额，则 estimatedAmount 必须直接取该金额（元，输出为单一金额字符串）。
         - “中标金额”优先取中标单位的中标金额；若无明确中标金额，则取第一位中标候选单位的投标报价作为兜底。
      2) 若无中标金额，但能识别出标的物/采购清单/服务范围等（即存在标的物），则让模型识别该项目下所有标的物的预估价格（综合数量/规格/工程量等），输出合理的预估金额（单一金额或范围）。
      3) 若无中标金额，且无法识别任何标的物，则返回 ""（不要猜）。

      禁止把招标文件售价、服务费、保证金、CA/平台费用等无关费用当作预估金额。

  # ===== 地址字段（3 组 * 5，均为 string）=====
  # 规则：
  # - 详情页提取不到则填 ""（空字符串）
  # - Country 默认填 "中国"（除非详情明确为其他国家）

  - key: buyerCountry
    name: 采购单位国家
    type: string
    stage: flat
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: buyerProvince
    name: 采购单位省
    type: string
    stage: flat
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: buyerCity
    name: 采购单位市
    type: string
    stage: flat
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: buyerDistrict
    name: 采购单位区县
    type: string
    stage: flat
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: buyerAddressDetail
    name: 采购单位详细地址
    type: string
    stage: flat
    hint: |
      从详情页提取到的“采购人/招标人/采购单位/招标单位”的完整地址（全地址文本），用于后续解析国家/省/市/区。
      注意：不要把“代理机构/平台技术支持”等其它单位的地址当成采购单位地址；如果只有这些地址，填 ""。
      结构化输入兜底（JSON + description）：
      - 若输入为 JSON，且存在 data + description 两个对象：data 存放原始值，description 描述 data 内每个 key 的含义。
      - 优先使用 description 明确标注为“采购单位地址/招标人地址/采购人地址/联系地址”等的字段值作为 buyerAddressDetail。
      - 如果找不到明确的“详细地址”字段，但 description 明确给出了采购单位的省/市/区县来源（例如 description 中出现 “→ buyerProvince / buyerCity / buyerDistrict”）：
        1) 找到映射到 buyerProvince/buyerCity/buyerDistrict 的 data key（字段名不固定，可能是 area/city/district 等）。
        2) 取 data 中对应值，按“省+市+区县”的顺序拼接成最小可解析地址（例如："新疆乌鲁木齐市水磨沟区"）填入 buyerAddressDetail（不要猜街道门牌）。
        3) 只要省/市/区县任意一个非空，就必须输出 buyerAddressDetail（缺失的部分跳过）。
      - 禁止从正文内容字段（例如 detail/announcementContent/公告正文）中的“送货地址/交货地址/履约地点”等回填采购单位地址。
      找不到填 ""。

  - key: projectCountry
    name: 项目所在国家
    type: string
    stage: flat
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: projectProvince
    name: 项目所在省
    type: string
    stage: flat
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: projectCity
    name: 项目所在市
    type: string
    stage: flat
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: projectDistrict
    name: 项目所在区县
    type: string
    stage: flat
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: projectAddressDetail
    name: 项目所在详细地址
    type: string
    stage: flat
    hint: |
      从详情页提取到的“项目地点/项目所在地/建设地点/工程地点”等项目相关地址（全地址文本），用于后续解析国家/省/市/区。
      注意：不要使用采购单位/代理机构的地址来回填项目地址；找不到填 ""。
      结构化输入兜底（JSON + description）：
      - 若输入为 JSON，且存在 data + description 两个对象：data 存放原始值，description 描述 data 内每个 key 的含义。
      - 优先使用 description 明确标注为“项目地点/项目所在地/建设地点/工程地点”等的字段值作为 projectAddressDetail。
      - 如果找不到明确的“项目地址”字段，但 description 明确给出了项目的省/市/区县来源（例如 description 中出现 “→ projectProvince / projectCity / projectDistrict”）：
        1) 找到映射到 projectProvince/projectCity/projectDistrict 的 data key（字段名不固定，可能是 area/city/district 等）。
        2) 取 data 中对应值，按“省+市+区县”的顺序拼接成最小可解析地址（例如："新疆乌鲁木齐市水磨沟区"）填入 projectAddressDetail（不要猜街道门牌）。
        3) 只要省/市/区县任意一个非空，就必须输出 projectAddressDetail（缺失的部分跳过）。
      - 禁止从正文内容字段（例如 detail/announcementContent/公告正文）中的“送货地址/交货地址/履约地点”等回填项目地址。

  - key: deliveryCountry
    name: 交货国家
    type: string
    stage: flat
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: deliveryProvince
    name: 交货省
    type: string
    stage: flat
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: deliveryCity
    name: 交货市
    type: string
    stage: flat
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: deliveryDistrict
    name: 交货区县
    type: string
    stage: flat
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: deliveryAddressDetail
    name: 交货详细地址
    type: string
    stage: flat
    hint: |
      从详情页提取到的“交货地点/履约地点/服务地点/供货地点/收货地址”等交付相关地址（全地址文本），用于后续解析国家/省/市/区。
      注意：不要使用采购单位/代理机构地址来回填交货地址；找不到填 ""。
      结构化输入兜底（JSON + description）：
      - 若输入为 JSON，且存在 data + description 两个对象：data 存放原始值，description 描述 data 内每个 key 的含义。
      - 优先使用 description 明确标注为“交货地点/履约地点/收货地址/送货地址”等的字段值作为 deliveryAddressDetail。
      - 如果找不到明确的交付“详细地址”字段，但 description 明确给出了交付的省/市/区县来源：
        1) 找到映射到 deliveryProvince/deliveryCity/deliveryDistrict 的 data key。
        2) 取 data 中对应值，按“省+市+区县”的顺序拼接成最小可解析地址填入 deliveryAddressDetail（不要猜街道门牌）。
        3) 只要省/市/区县任意一个非空，就必须输出 deliveryAddressDetail（缺失的部分跳过）。

  - key: buyerName
    name: 采购单位
    type: string
    stage: flat
    required: true
    hint: 招标单位/采购单位全称

  - key: buyerContact
    name: 采购单位联系人
    type: string
    stage: flat
    hint: 采购单位联系人（如有）

  - key: buyerPhone
    name: 采购单位联系电话
    type: string
    stage: flat
    hint: 采购单位联系电话（如有）

  - key: buyerEmail
    name: 采购单位联系邮箱
    type: string
    stage: flat
    hint: 采购单位联系邮箱（如有）

  - key: agency
    name: 招标代理机构
    type: string
    stage: flat
    hint: 招标代理机构全称（如有）

  - key: announcementType
    name: 公告类别
    type: string
    stage: flat
    required: true
    enum: [预审, 招标, 询价, 竞谈, 竞价, 邀标, 单一, 变更, 答疑, 候选, 中标, 合同, 终止]
    hint: |
      必须从枚举中选择一个（只输出枚举值本身）。

      判断优先级（从高到低）：
      1) 先从“正文内容/公告详情/公告正文”字段的内容判断公告类别；该正文字段的 key 在输入的 description 中会被说明（例如 “XXX → announcementContent/公告正文/详情”）。
         - 例如若正文出现“中标候选人/候选人公示/中标候选人公示/评标结果公示/推荐中标候选人/入围候选人”等候选相关表述，则 announcementType 必须为“候选”。
           注意：“中标候选人”不是“中标结果”，即使正文/标题里包含“中标”二字也仍应归为“候选”。
         - 例如若正文明确为结果公告（如“中标结果公告/成交结果公告/中标公告/成交公告/定标结果/授标结果/中选结果”等），则 announcementType 为“中标”（成交/中选也归为中标）。
         - 其它类型按正文语义判断：资格预审→预审；招标公告/采购公告→招标；询价公告→询价；竞争性谈判/磋商→竞谈；竞价→竞价；邀请招标→邀标；单一来源→单一；更正/变更/澄清→变更；答疑/疑问回复→答疑；合同公告→合同；终止/中止/废标/流标→终止。

      2) 只有当正文内容字段缺失或无法判断时，才允许参考其它字段（如标题或输入中显式给出的“公告类别”字段）。
         - 若其它字段与正文判断冲突，必须以正文为准（因为部分来源的“announcementType/公告类别”字段可能标错）。

  # ===== 标段字段（stage: lots）=====
