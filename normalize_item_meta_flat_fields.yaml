# 定义需要从详情页中提取的字段（按 stage 分组，用于两次 LLM 提取）
#
# - type: string (默认) | number | boolean | array
# - stage: flat | lots
#
# 约定：
# - 金额字段单位统一为“元”，小数位数尽量与原页面保持一致
# - 日期字段格式统一为 YYYY-MM-DD
# - array 字段无内容时返回 []

fields:
  # ===== 扁平字段（stage: flat）=====
  - key: announcementUrl
    name: 公告链接
    type: string
    stage: flat
    hint: 公告详情页的原始链接 URL（如果输入文本中出现多个 URL，优先选择最像“公告详情页/正文页”的链接；找不到填 ""）

  - key: announcementName
    name: 公告标题
    type: string
    stage: flat
    hint: 公告标题/公告名称（找不到填 ""）

  - key: announcementContent
    name: 公告正文
    type: string
    stage: flat
    hint: 公告正文/公告详情文字内容（不要直接输出整段输入文本；找不到填 ""）

  - key: projectName
    name: 项目名称
    type: string
    stage: flat
    hint: 整个招投标项目名称（取详情页的项目名称，或智能体总结）

  - key: projectId
    name: 项目编号
    type: string
    stage: flat
    hint: |
      仅提取“项目编号/招标编号/采购编号/询价单号/合同编号/公告编号”等【明确标注】的编号值：
      - 典型写法：项目编号：XXX / 招标编号：XXX / 采购编号：XXX / 询价单号：XXX / 合同编号：XXX / 公告编号：XXX / No./Code: XXX
      - 如果输入文本本身是 JSON，且存在 projectId/projectcode/noticeCode/bidCode/招标编号 等字段，优先使用这些字段值（取编号本体）。
      禁止从标题/项目名称里的数字去“猜”项目编号：标题中嵌入的短纯数字（尤其 6 位数字，如 260206）很多时候只是日期缩写（YYMMDD）或内部批次号，不是正式编号；
      除非正文中有明确“编号”标签或结构化字段承载该值，否则不要填入 projectId。
      不要把物资编码/物料编码/设备编码、电话号码、日期、金额、数量等数字当作 projectId。
      找不到或不确定时填 ""。

  - key: announcementDate
    name: 公告日期
    type: string
    stage: flat
    required: true
    hint: |
      公告实际发布日期，格式 YYYY-MM-DD。
      - 必须从输入结构体中的“发布日期/发布时间/公告日期”等元数据字段提取（字段名不固定时，以 description 字段对各 key 含义的说明为准）。
      - 若该元数据字段为时间戳（秒/毫秒），请换算为 YYYY-MM-DD；若为其它日期文本，也请规范为 YYYY-MM-DD。
      - 禁止从正文内容字段（例如 detail/announcementContent/公告正文 等）中的日期推断 announcementDate；正文中的“预计发布时间/计划发布时间”等不是公告发布日期。
      - 找不到明确的发布日期字段时填 ""（不要猜）。

  - key: bidOpenDate
    name: 开标日期
    type: string
    stage: flat
    hint: 项目开标日期，格式 YYYY-MM-DD

  - key: budgetAmount
    name: 预算金额
    type: number
    stage: flat
    hint: 数字，单位：元。若页面为万元/亿需换算到元（小数位数尽量与原页面保持一致）

  - key: winnerAmount
    name: 中标金额
    type: number
    stage: flat
    hint: 数字，单位：元。仅当详情页明确给出“中标/成交/定标/授标金额”等信息时填写；取不到填 null

  - key: estimatedAmount
    name: 预估金额
    type: string
    stage: flat
    required: true
    hint: 仅当公告类型为“招标”或“候选”时，根据公告全文内容给出预估报价金额（元）。必须输出：单一金额（如 "123456.78"）或范围（如 "100000~200000"，范围用 ~ 连接）。估价必须主要依据标的物/服务范围/工程量/数量/规格等信息进行推算；不得把招标文件售价、服务费、保证金、CA费用、平台费用等无关费用当作预估金额。即使正文未明确给出金额，也必须给出合理估价范围，禁止返回空字符串。其它公告类型必须返回 ""。

  # ===== 地址字段（3 组 * 5，均为 string）=====
  # 规则：
  # - 详情页提取不到则填 ""（空字符串）
  # - Country 默认填 "中国"（除非详情明确为其他国家）

  - key: buyerCountry
    name: 采购单位国家
    type: string
    stage: flat
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: buyerProvince
    name: 采购单位省
    type: string
    stage: flat
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: buyerCity
    name: 采购单位市
    type: string
    stage: flat
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: buyerDistrict
    name: 采购单位区县
    type: string
    stage: flat
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: buyerAddressDetail
    name: 采购单位详细地址
    type: string
    stage: flat
    hint: |
      从详情页提取到的“采购人/招标人/采购单位/招标单位”的完整地址（全地址文本），用于后续解析国家/省/市/区。
      注意：不要把“代理机构/平台技术支持”等其它单位的地址当成采购单位地址；如果只有这些地址，填 ""。
      结构化输入兜底（JSON + description）：
      - 若输入文本本身是 JSON，且存在 description 对各字段含义的说明：当无法找到明确的采购单位“详细地址”字段时，
        请根据 description 指明的“采购单位省/市/区县”（字段名不固定，可能分别映射到 buyerProvince/buyerCity/buyerDistrict）
        将省/市/区县按顺序拼接成最小可解析地址（例如："西藏自治区林芝市波密县"）填入 buyerAddressDetail（不要猜街道门牌）。
      - 禁止从正文内容字段（例如 detail/announcementContent/公告正文）中的“送货地址/交货地址/履约地点”等回填采购单位地址。
      找不到填 ""。

  - key: projectCountry
    name: 项目所在国家
    type: string
    stage: flat
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: projectProvince
    name: 项目所在省
    type: string
    stage: flat
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: projectCity
    name: 项目所在市
    type: string
    stage: flat
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: projectDistrict
    name: 项目所在区县
    type: string
    stage: flat
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: projectAddressDetail
    name: 项目所在详细地址
    type: string
    stage: flat
    hint: |
      从详情页提取到的“项目地点/项目所在地/建设地点/工程地点”等项目相关地址（全地址文本），用于后续解析国家/省/市/区。
      注意：不要使用采购单位/代理机构的地址来回填项目地址；找不到填 ""。
      结构化输入兜底（JSON + description）：
      - 若输入文本本身是 JSON，且存在 description 对各字段含义的说明：当无法找到明确的“项目所在地/建设地点”等地址字段时，
        请根据 description 指明的“项目省/市/区县”（字段名不固定，可能分别映射到 projectProvince/projectCity/projectDistrict）
        将省/市/区县按顺序拼接成最小可解析地址（例如："西藏自治区林芝市波密县"）填入 projectAddressDetail（不要猜街道门牌）。
      - 禁止从正文内容字段（例如 detail/announcementContent/公告正文）中的“送货地址/交货地址/履约地点”等回填项目地址。

  - key: deliveryCountry
    name: 交货国家
    type: string
    stage: flat
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: deliveryProvince
    name: 交货省
    type: string
    stage: flat
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: deliveryCity
    name: 交货市
    type: string
    stage: flat
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: deliveryDistrict
    name: 交货区县
    type: string
    stage: flat
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: deliveryAddressDetail
    name: 交货详细地址
    type: string
    stage: flat
    hint: |
      从详情页提取到的“交货地点/履约地点/服务地点/供货地点/收货地址”等交付相关地址（全地址文本），用于后续解析国家/省/市/区。
      注意：不要使用采购单位/代理机构地址来回填交货地址；找不到填 ""。
      结构化输入兜底（JSON + description）：
      - 若输入文本本身是 JSON，且存在 description 对各字段含义的说明：当无法找到明确的“交货/履约/收货”详细地址字段时，
        可根据 description 指明的交付省/市/区县字段（字段名不固定）拼接成最小可解析地址填入 deliveryAddressDetail（不要猜街道门牌）。

  - key: buyerName
    name: 采购单位
    type: string
    stage: flat
    required: true
    hint: 招标单位/采购单位全称

  - key: buyerContact
    name: 采购单位联系人
    type: string
    stage: flat
    hint: 采购单位联系人（如有）

  - key: buyerPhone
    name: 采购单位联系电话
    type: string
    stage: flat
    hint: 采购单位联系电话（如有）

  - key: buyerEmail
    name: 采购单位联系邮箱
    type: string
    stage: flat
    hint: 采购单位联系邮箱（如有）

  - key: agency
    name: 招标代理机构
    type: string
    stage: flat
    hint: 招标代理机构全称（如有）

  - key: announcementType
    name: 公告类别
    type: string
    stage: flat
    required: true
    enum: [预审, 招标, 询价, 竞谈, 竞价, 邀标, 单一, 变更, 答疑, 候选, 中标, 合同, 终止]
    hint: |
      必须从枚举中选择一个。注意语义判断：
      - “评标结果公示” 属于“候选”
      - “招标结果公告/成交结果公告” 属于“中标”

  # ===== 标段字段（stage: lots）=====
