# 定义需要从输入文本（/normalize_item 的 sourceJson）中提取的字段（按 stage 分组，多次 LLM 提取）
# 说明：文件名为历史原因（最初仅包含 meta+flat），目前包含多个 stage：meta / contacts / address_detail / lots / address_admin / estimated_amount
#
# - type: string (默认) | number | boolean | array
# - stage: meta | contacts | address_detail | lots | address_admin | estimated_amount
#
# 约定：
# - 金额字段单位统一为“元”，小数位数尽量与原始表述保持一致
# - 日期字段格式统一为 YYYY-MM-DD
# - array 字段无内容时返回 []

fields:
  # ===== 元信息（stage: meta）=====
  - key: announcementUrl
    name: 公告链接
    type: string
    stage: meta
    hint: 公告链接 URL（如果输入文本中出现多个 URL，优先选择最像“公告链接/正文链接”的；找不到填 ""）

  - key: announcementName
    name: 公告标题
    type: string
    stage: meta
    hint: 公告标题/公告名称（从输入中语义为“标题”的内容提取；若输入为 Markdown，则输出“标题”字样的整个小节, 必须整段输出整个小节, 不可以截断；找不到填 ""）

  - key: announcementContent
    name: 公告正文
    type: string
    stage: meta
    hint: 公告正文/公告详情文字内容（从输入中语义为“正文/详情”的内容提取；若输入为 Markdown，则输出“正文”字样的整个小节,必须整段输出整个小节, 不可以截断；找不到填 ""）

  - key: projectName
    name: 项目名称
    type: string
    stage: meta
    hint: |
      整个招投标项目名称。
      - 优先从标题提取项目名称；只有当标题无法明确识别项目主体名称时，才允许参考正文或其它输入字段补充判断。
      - 标题中若同时包含项目名称、编号、公告类型后缀（如“招标公告/竞价公告/采购公告/结果公告”）等，优先保留项目主体名称，避免把公告类型后缀、批次号、编号整体并入 projectName。
      - 必要时可做简短归纳，但不要凭空编造；找不到填 ""。

  - key: projectId
    name: 项目编号
    type: string
    stage: meta
    hint: |
      仅提取“项目编号/招标编号/采购编号/询价单号/合同编号/公告编号”等【明确标注】的编号值：
      - 典型写法：项目编号：XXX / 招标编号：XXX / 采购编号：XXX / 询价单号：XXX / 合同编号：XXX / 公告编号：XXX / No./Code: XXX
      - 若同一段元信息中同时出现“招标编号”和“招标项目编号”，优先提取前者（即“招标编号”对应的值）。
      - 如果输入文本本身是 JSON，且存在 projectId/projectcode/noticeCode/bidCode/招标编号 等字段，优先使用这些字段值（取编号本体）。
      - 若编号值后面带有轮次/次数后缀，如 “JPZQ-1-JXZL-2025-042（第二次）”“XXX(二次)”“XXX（重新招标）”，输出时必须去掉这类尾部说明，只保留编号本体，例如输出 “JPZQ-1-JXZL-2025-042”。
      禁止从标题/项目名称里的数字去“猜”项目编号：标题中嵌入的短纯数字（尤其 6 位数字，如 260206）很多时候只是日期缩写（YYMMDD）或内部批次号，不是正式编号；
      除非正文中有明确“编号”标签或结构化字段承载该值，否则不要填入 projectId。
      不要把物资编码/物料编码/设备编码、电话号码、日期、金额、数量等数字当作 projectId。
      找不到或不确定时填 ""。

  - key: announcementDate
    name: 公告日期
    type: string
    stage: meta
    required: true
    hint: |
      公告实际发布日期，格式 YYYY-MM-DD。
      - 当输入同时包含“标题/正文”和其它字段（非标题/正文字段）时，announcementDate 优先从其它字段中【明确标注】的“发布时间/发布日期/公告日期/公告时间”等元数据字段提取；只有当其它字段缺失或无法提取时，才允许回退到标题/正文中的【明确标注】发布日期字段。
      - 必须从输入文本中【明确标注】的发布日期元数据字段提取（例如“发布时间/发布日期/公告日期/公告时间”等标签对应的值；若为 Markdown，通常表现为小节名包含这些关键词）。
      - 若该元数据字段为时间戳（秒/毫秒），请换算为 YYYY-MM-DD；若为其它日期文本，也请规范为 YYYY-MM-DD。
      - 禁止从正文内容字段（例如 detail/announcementContent/公告正文 等）中的日期推断 announcementDate；正文中的“预计发布时间/计划发布时间”等不是公告发布日期。
      - 找不到明确的发布日期字段时填 ""（不要猜）。

  - key: bidOpenDate
    name: 开标日期
    type: string
    stage: meta
    hint: 项目开标日期，格式 YYYY-MM-DD

  - key: budgetAmount
    name: 预算金额
    type: number
    stage: meta
    hint: 数字，单位：元。若输入为万元/亿需换算到元（小数位数尽量与原始表述保持一致）

  - key: winnerAmount
    name: 中标金额
    type: number
    stage: meta
    hint: 数字，单位：元。仅当输入明确给出“中标/成交/定标/授标金额”等信息时填写；取不到填 null

  - key: estimatedAmount
    name: 预估金额
    type: string
    stage: estimated_amount
    required: true
    hint: |
      预估金额（AI 预估价），单位：元。输出必须为范围 "下限~上限"（不要输出单一金额；如只有单值金额，请输出为 "X~X"）。

      计算逻辑（优先级高 -> 低）：
      1) 若输入中存在明确“中标/成交/定标/授标金额”等中标金额信息，则 estimatedAmount 必须直接取该金额，并输出为 "X~X"。
         - 优先取中标单位的中标金额；若无明确中标金额，则取第一位中标候选单位的投标报价作为兜底。
      2) 若无中标金额，但存在标的物信息（即有标的物），estimatedAmount 不允许为空，必须根据该项目下所有标的物信息（数量/规格/工程量等）估算项目总价，输出合理范围 "下限~上限"。
         - 即使 lotProducts 对应的是维修、检修、安装、运输、施工服务等服务型标的，也必须估算当前服务范围的总成交/交易金额区间，不能因为项目属于服务型场景就返回空。
         - 标的物信息仅以已抽取出的 lotProducts / 采购清单结构化结果为准；不要再从标题/正文中重新识别、补写或改写标的物、数量、型号。
         - 标题/正文只可用于识别会对金额范围形成硬约束的价格信息，例如最高限价、最低限价、控制价、起拍价、保留价等；除这类金额边界外，忽略其它正文信息。
         - 若 lotProducts 中出现单价/数量/总价为 0 等明显占位值，默认视为未知，不能直接把 0 当作预估金额下限；只要标的物类型可识别，就应给出 >0 的合理下限。
         - 必须基于同类标的物在真实市场中的采购/成交价格进行估算；对于维修、安装、运输、施工服务等服务型标的，则基于同类服务在真实市场中的成交价格进行估算；不要为了满足格式随意给出 0、1 或其它明显失真的极小值。
         - 若标的物类型已可识别，则下限必须是“按真实市场价格实际可成交/可采购”的合理下限，不能输出明显不具备交易可行性的占位数值。
         - 即使没有明确单价/预算/限价，也要基于常识/市场范围给出保守且偏宽的区间（宁可范围大，也不要返回空）。严禁输出只有波浪线的 "~"、单边范围（如 "100000~" / "~100000"）或其它缺边界的非法格式。
      3) 若无中标金额且无标的物，则返回 ""（不要猜）。

      禁止把招标文件售价、服务费、保证金、CA/平台费用等无关费用当作预估金额。
      注意：忽略非金额范围（例如 1.4~3m3、日期范围等），不要把它们当作预估金额。
      输出格式要求：必须为纯数字范围 "下限~上限"（阿拉伯数字；不带单位/空格/逗号；禁止科学计数法）。

  # ===== 地址字段（两步：先抽 AddressDetail，再派生 country/province/city/district）=====

  - key: buyerCountry
    name: 采购单位国家
    type: string
    stage: address_admin
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: buyerProvince
    name: 采购单位省
    type: string
    stage: address_admin
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: buyerCity
    name: 采购单位市
    type: string
    stage: address_admin
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: buyerDistrict
    name: 采购单位区县
    type: string
    stage: address_admin
    hint: 从“buyerAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: buyerAddressDetail
    name: 采购单位详细地址
    type: string
    stage: address_detail
    hint: |
      从输入文本中提取“采购单位/招标人/采购人”的完整地址（全地址文本），用于后续解析国家/省/市/区。
      - 若缺少街道门牌等详细地址，但输入中【明确给出】采购地址对应的省/市/区县拆分信息，允许按“省+市+区县”拼接成最小可解析地址（不要猜街道门牌）。
      - 若没有门牌信息，但明确给出了采购单位所在地的单位名/厂区/矿区/项目部等地点主体，也允许直接使用该主体名称；必要时可与已明确给出的省市区信息拼接。
      注意：不要把“代理机构/平台技术支持”等其它单位的地址当成采购单位地址；找不到填 ""。

  - key: projectCountry
    name: 项目所在国家
    type: string
    stage: address_admin
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: projectProvince
    name: 项目所在省
    type: string
    stage: address_admin
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: projectCity
    name: 项目所在市
    type: string
    stage: address_admin
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: projectDistrict
    name: 项目所在区县
    type: string
    stage: address_admin
    hint: 从“projectAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: projectAddressDetail
    name: 项目所在详细地址
    type: string
    stage: address_detail
    hint: |
      从输入文本中提取“项目地址”的全地址文本（用于后续解析国家/省/市/区）。如果出现"使用地址"等, 也认为是项目地址。
      - 若缺少街道门牌等详细地址，但输入中【明确给出】项目地址对应的省/市/区县拆分信息，允许按“省+市+区县”拼接成最小可解析地址（不要猜街道门牌）。
      - 若没有门牌信息，但明确给出了项目地点对应的厂区/矿区/工地/项目部/站点等地点主体，也允许直接使用该主体名称；必要时可与已明确给出的省市区信息拼接。
      注意：不要使用采购单位/代理机构的地址来回填项目地址；找不到填 ""。

  - key: deliveryCountry
    name: 交货国家
    type: string
    stage: address_admin
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的国家；若详细地址为空则填“中国”

  - key: deliveryProvince
    name: 交货省
    type: string
    stage: address_admin
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的省/自治区/直辖市；解析不到填 ""

  - key: deliveryCity
    name: 交货市
    type: string
    stage: address_admin
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的市/州；解析不到填 ""

  - key: deliveryDistrict
    name: 交货区县
    type: string
    stage: address_admin
    hint: 从“deliveryAddressDetail(详细地址/全地址)”中解析得到的区/县/旗；解析不到填 ""

  - key: deliveryAddressDetail
    name: 交货详细地址
    type: string
    stage: address_detail
    hint: |
      从输入文本中提取“送货地址”的全地址文本（用于后续解析国家/省/市/区）。如果出现"使用地址"等, 不认为是交货地址。
      - 若缺少街道门牌等详细地址，但输入中【明确给出】送货地址对应的省/市/区县拆分信息，允许按“省+市+区县”拼接成最小可解析地址（不要猜街道门牌）。
      - 若没有门牌信息，但明确给出了收货单位/工厂/矿区/项目部/站点等交付地点主体，也允许直接使用该主体名称；必要时可与已明确给出的省市区信息拼接。
      注意：不要使用采购单位/代理机构地址来回填送货地址；找不到填 ""。

  - key: buyerName
    name: 采购单位
    type: string
    stage: contacts
    required: true
    hint: 招标单位/采购单位全称

  - key: buyerContact
    name: 采购单位联系人
    type: string
    stage: contacts
    hint: 采购单位联系人（如有）

  - key: buyerPhone
    name: 采购单位联系电话
    type: string
    stage: contacts
    hint: 采购单位联系电话（如有）

  - key: buyerEmail
    name: 采购单位联系邮箱
    type: string
    stage: contacts
    hint: 采购单位联系邮箱（如有）

  - key: agency
    name: 招标代理机构
    type: string
    stage: contacts
    hint: 招标代理机构全称（如有）

  - key: announcementType
    name: 公告类别
    type: string
    stage: meta
    required: true
    enum: [预审, 招标, 询价, 竞谈, 竞价, 邀标, 单一, 变更, 答疑, 候选, 中标, 合同, 终止]
    hint: |
      必须从枚举中选择一个（只输出枚举值本身）。

      判断优先级（从高到低）：
      1) 先从“正文内容/公告详情/公告正文”的内容判断公告类别；若输入为 Markdown，正文通常在小节名包含“正文”字样的部分中。
         - 例如若正文出现“中标候选人/候选人公示/中标候选人公示/评标结果公示/推荐中标候选人/入围候选人”等候选相关表述，则 announcementType 必须为“候选”。
           注意：“中标候选人”不是“中标结果”，即使正文/标题里包含“中标”二字也仍应归为“候选”。
         - 例如若正文明确为结果公告（如“中标结果公告/成交结果公告/中标公告/成交公告/定标结果/授标结果/中选结果”等），则 announcementType 为“中标”（成交/中选也归为中标）。
         - 其它类型按正文语义判断：资格预审→预审；招标公告/采购公告→招标；询价公告→询价；竞争性谈判/磋商→竞谈；竞价→竞价；邀请招标→邀标；单一来源→单一；更正/变更/补遗→变更；澄清/澄清公告/澄清文件/澄清通知/答疑/答疑公告/疑问回复/问题答复→答疑；合同公告→合同；终止/中止/废标/流标→终止。
         - 若当前页面本质是在修改、补充、延期、纠正既有公告，例如出现“变更公告/更正公告/补充公告/延期公告/补遗/补充说明”“原……现改为……”“现更正为……”“以本次公告为准”等表述，且不属于澄清答疑类，则必须判为“变更”；即使标题里仍带“招标公告/采购公告”，也不能继续判为“招标”。
         - 若标题或正文出现“澄清公告/澄清文件/澄清通知/答疑公告/疑问回复/问题答复”等澄清答疑类表述，即使同时出现“变更/更正”等字样，也优先判为“答疑”。

      2) 只有当正文内容字段缺失或无法判断时，才允许参考其它字段（如标题或输入中显式给出的“公告类别”字段）。
         - 若其它字段与正文判断冲突，必须以正文为准（因为部分来源的“announcementType/公告类别”字段可能标错）。

  - key: isEquipment
    name: 是否设备采购类
    type: boolean
    stage: meta
    hint: |
      判断该公告是否属于“设备采购类”相关：
      - 最高优先级排除规则：若标题/正文/标的物明确表明项目主题属于“二手设备采购/旧设备采购/闲置设备处置/废旧设备处置”等二手或旧设备相关场景，必须输出 false；即使同时出现设备名称，也不能输出 true。
      - 最高优先级排除规则：若标题/正文明确表明项目主题属于“招标代理服务/采购代理服务/代理机构选聘/代理中介服务/中介机构选聘/中介咨询服务”等代理、中介、选聘服务类项目，必须输出 false；即使正文出现设备名称，也不能输出 true。
      - 最高优先级排除规则：若标题/正文/标的物明确表明项目主题属于“设备安装/安装工程/安装服务/安装寻源/拆除/迁改/改造/维修施工”等针对既有设备的安装施工或服务类项目，必须输出 false；即使同时出现设备名称，也不能输出 true。例如“稳定土搅拌站安装鲁班二次寻源”应判为 false。
      - 最高优先级排除规则：若标题/正文/标的物明确表明项目主题属于“维修/检修/修理/大修/保养服务”等设备维修服务类项目，或属于“运输/海运费/运费/物流/配送/仓储/货运服务”等运输物流服务类项目，必须输出 false；即使同时出现设备名称，也不能输出 true。例如“中煤大同能源公司塔山煤矿交流变频电牵引采煤机维修结果公告”和“上海振华重工（就上海港机重工）2026年1002001612土耳其一台柴油正面吊海运费项目”都应判为 false。
      - 最高优先级排除规则：若标题/正文/标的物明确表明项目主题属于“施工服务/工程-施工/工程施工/施工总承包/专业施工/施工图及工程量清单内全部工程施工/房屋建筑工程施工/土建施工”等施工或工程实施类项目，必须输出 false；即使正文或采购清单中出现“生产线/装载机/叉车”等设备名称，也不能输出 true。例如“2026年杨河乡草产业综合加工项目”这类“采购类别：工程-施工”“招标内容：本项目施工图及工程量清单内全部工程施工”的项目应判为 false。
      - 当标题/正文/标的物中明确涉及设备/装备/机器/机组/装置等实物本体的采购、购置、供货时，填 true；若设备本体采购同时附带安装、调试、维保等配套服务，仍可填 true。
      - 仅当明确为纯服务/纯工程施工/安装施工/维修服务/运输物流服务/咨询审计/物业劳务等，且不涉及设备本体采购时，填 false。
      - 不确定时默认 true（宁可误判为 true，也不要漏掉设备采购类）。
      - 以下是"设备采购类"相关定义:有效公告核心判定场景该场景用于筛选出符合要求的整机设备采购公告，需同时满足三项核心特征：
        - 采购性质特征：公告含 “采购”“招标”“购置”“供应” 等采购类关键词；明确涉及设备所有权转移，** 排除租赁、安装服务、安装施工、维修服务、运输物流服务、运营等非所有权转移的合作模式 **。
        - 设备属性特征：包含工程机械整机的标准名称、常见型号或产品大类（如挖机、挖掘机）；
      无效公告精准排除场景该场景用于剔除所有不符合有效公告要求的内容：
      - 采购性质特征排除：
        - 非采购 / 非所有权转移类：含 “租赁”“租用”“运营”“转让”“拍卖”“施工”“安装”“安装工程”“安装服务”“安装寻源”“拆除”“迁改”“维修”“检修”“修理”“大修”“保养服务” 等关键词，或有 “台班”“小时”“丢失赔偿” 等暗示租赁/安装服务/维修服务的表述；
        - 关联服务类：含 “运输”“海运费”“运费”“物流”“配送”“仓储”“货运服务” 等与设备采购无关的服务内容；
        - 主体不符类：含 “销售” 等以销售为主体，而非采购的项目；
        - 对“二手设备采购/旧设备采购/闲置设备处置/废旧设备处置”等项目主题，必须排除。
        - 对“招标代理服务/采购代理服务/代理机构选聘/代理中介服务/中介机构选聘/中介咨询服务”等项目主题，必须排除。
      - 设备属性特征排除：
        - 非整机类：涉及 “配件”“零件”“维修” 等非整机内容，或设备名称含 “配套”“附加”“辅助” 等修饰词；
        - 无关品类类：含 “玩具”“模型” 等非工业设备内容；
      
      

  # ===== 标段字段（stage: lots）=====
  - key: lotProducts
    name: 标段采购产品列表
    type: array
    stage: lots
    hint: |
      返回数组，每个元素是一条“标的物行”（同一标段多条标的物就返回多条记录）：
      {
        "lotNumber": "标段一/标段二/...（必须是“标段X”格式）",
        "lotName": "标段名称（如有）",
        "subjects": "标的物（单条）",
        "productCategory": "具体产品（只按 subjects 匹配“具体产品表”；直接填写表中与 subjects 最贴近、最具体的那个候选项本身；表中所有词都是平级候选项，换行仅为阅读方便；先保持主类一致，再比较修饰词；不要用 models/型号参与匹配；若 subjects 明显是系统、配件、备件、零件、组件、附件、脚踏板等非整机对象，则必须填\"\"；匹配不到填\"\"）",
        "models": "型号（单条）"; 也包括该单条标的物的一些** 规格或描述 **,
        "unitPrices": "单价（元，number；取不到填 null；如果是范围/多个值/非金额文本，填 null；若输入写万/亿需换算成元）",
        "quantities": "数量（正整数，单条）",
        "quantityUnit": "数量单位（如 台/套/个/门...；找不到填\"\"）"
      }

      重要规则：
      - 若输入未明确拆分多个标段，但能识别到标的物信息，也请返回单标段对象：lotNumber="标段一"
      - lotNumber 必须输出为“标段一/标段二/...”这种格式；严禁把项目编号/招标编号/公告编号（如 CEZB****）填到 lotNumber
      - 若正文里存在多个不同的原始标段/包件标识，必须把它们视为不同 lot；例如“标1包2”“标1包3”“标1包4”是三个不同 lot，不能都写成同一个 lotNumber
      - 判断 lot 是否相同，必须看完整的“标号+包号”组合，而不是只看“标号”；例如“标1包1/标1包2/标1包3/标1包4”分别对应四个不同的 lotNumber
      - lotNumber 的“标段一/标段二/...”应按当前公告中不同原始 lot 首次出现的顺序依次编号；同一个原始标段/包件在 lotProducts 和 lotCandidates 中必须共用同一个 lotNumber，lotName 尽量保留原文中的标段/包件名称
      - 若同一标段存在多个标的物，不要在字段里输出数组；请输出多条元素，每条一行
      - 同一标的物的多条技术参数/规格请合并写在 models 字段（可多行或用 “；” 分隔），不要拆成多条标的物行
      - 即使输入是结果公示/评标结果公示/候选公示类正文，只要正文明确出现“包件/标段 + 设备名/物资名”（例如“包件2推土机”“标段三压路机”），也必须同步输出对应的 lotProducts，不能只输出 lotCandidates
      - 提取 lotProducts 时，不要求数量/单位/型号同时齐全；只要设备名/物资名明确，就应先保留该标的物行，缺失字段留空
      - 若输入中明确给出标的物/采购清单等列表信息，可直接提取；缺失时再从正文中识别
      - 若输入完全没有任何标的物信息，则返回 []

  - key: lotCandidates
    name: 标段候选/中标信息列表
    type: array
    stage: lots
    hint: |
      返回数组，每个元素是一条“单位行”（同一标段多行就返回多条记录）：
      {
        "lotNumber": "标段一/标段二/...（必须是“标段X”格式）",
        "lotName": "标段名称（如有）",
        "type": "中标/中标候选人/非中标候选人（三选一）",
        "candidates": "明显的公司/组织名（单条）；若不是明确主体名称则填空字符串",
        "candidatePrices": "该单位对应的金额/报价（元，number；取不到填 null；如果是范围/多个值/非金额文本，填 null；若输入写万/亿需换算成元）"
      }

      重要规则：
      - 若输入未明确拆分多个标段，但包含候选/中标/报价等信息，也请返回单标段对象：lotNumber="标段一"
      - lotNumber 必须输出为“标段一/标段二/...”这种格式；严禁把项目编号/招标编号/公告编号（如 CEZB****）填到 lotNumber
      - 若正文里存在多个不同的原始标段/包件标识，必须把它们视为不同 lot；例如“标1包2”“标1包3”“标1包4”是三个不同 lot，不能都写成同一个 lotNumber
      - 判断 lot 是否相同，必须看完整的“标号+包号”组合，而不是只看“标号”；例如“标1包1/标1包2/标1包3/标1包4”分别对应四个不同的 lotNumber
      - lotNumber 的“标段一/标段二/...”应按当前公告中不同原始 lot 首次出现的顺序依次编号；同一个原始标段/包件在 lotProducts 和 lotCandidates 中必须共用同一个 lotNumber，lotName 尽量保留原文中的标段/包件名称
      - 若同一标段存在多家候选单位，不要在字段里输出数组；请输出多条元素，每条一行
      - candidates 只允许填写明显的公司/组织名字符串（如有限公司、研究院、中心、学校、医院、厂、院、联合体等明确主体名称）；若对应文本不是明确主体名称，而是“另行公告/待公告/另行通知/详见附件/排名第1”等占位词、说明语或其他非主体文本，则 candidates 必须填 ""
      - 若某个 lot 的候选单位名称缺失或 candidates 应为 ""，也必须保留该 lot 的单位行；只将 candidates 置空，lotNumber/type/candidatePrices 等其它字段照常提取
      - 若输入中明确给出候选人/中标单位/报价等列表信息，可直接提取；缺失时再从正文中识别
      - 若输入完全没有候选/中标信息，则返回 []
      - 严禁推断：输入未明确给出“中标/成交/中选”等结论时，不要输出 type="中标"


